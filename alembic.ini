[alembic]
# Путь к папке со скриптами миграций (относительно этого файла)
script_location = alembic

# Добавляет корень проекта в sys.path, чтобы работали импорты "from bot..."
prepend_sys_path = .

# Шаблон имени файла миграции (год-месяц-день_время-ревизия_описание)
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# URL базы данных. 
# ВАЖНО: Это значение будет перезаписано из переменной окружения в env.py,
# но поле должно существовать, чтобы Alembic запустился.
sqlalchemy.url = postgresql+asyncpg://user:password@db:5432/anti_loneliness_bot_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S