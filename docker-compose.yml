services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./bot:/app/bot
      - ./alembic:/app/alembic 
    depends_on:
      - db
      - cache
    restart: unless-stopped
    command: python -m bot.main
    networks:
      - bot_net

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: anti_loneliness_bot_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: Ndgi23IOihgo7uygbhgofivkg2
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bot_net

  cache:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass StrongRedisPassword_2024! # 🔴 Добавил пароль
    volumes:
      - redis_data:/data
    networks:
      - bot_net

volumes:
  postgres_data:
  redis_data:

networks:
  bot_net:
    driver: bridge